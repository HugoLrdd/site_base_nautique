<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reçu #{{ "%03d" | format(commande.id) }} - Base Nautique</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .btn-imprimer {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .ticket {
            background: white;
            width: 100%;
            max-width: 320px;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .ticket-header { text-align: center; margin-bottom: 15px; }
        .ticket-header h1 { font-size: 1.2rem; }
        
        .ticket-numero { text-align: center; font-size: 1.8rem; font-weight: bold; color: #0056b3; margin: 10px 0; }
        .infos-date { font-size: 0.8rem; text-align: center; margin-bottom: 15px; color: #555; }

        .separateur { border: none; border-top: 1px dashed #bbb; margin: 10px 0; }

        .ligne-produit {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-size: 0.9rem;
            margin-bottom: 6px;
            gap: 10px;
        }

        .ligne-produit .nom { flex: 1; word-wrap: break-word; }
        .ligne-produit .prix { font-weight: bold; flex-shrink: 0; }

        .total-zone {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 2px solid #000;
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .ticket-footer { text-align: center; margin-top: 20px; font-size: 0.7rem; color: #777; }

        @media print {
            body { background: white; padding: 0; }
            .btn-imprimer { display: none; }
            .ticket { box-shadow: none; width: 100%; }
        }
    </style>
</head>
<body>

    <button class="btn-imprimer" onclick="window.print()">🖨️ Imprimer le reçu</button>

    <div class="ticket">
        <div class="ticket-header">
            <h1>⛵ BASE NAUTIQUE</h1>
            <p>Merville</p>
        </div>

        <hr class="separateur">

        <div class="ticket-numero">#{{ "%03d" | format(commande.id) }}</div>
        <div class="infos-date">{{ commande.heure.strftime('%d/%m/%Y à %H:%M') }}</div>

        <hr class="separateur">

        {% for prod in commande.produits %}
            <div class="ligne-produit">
                <span class="nom">{{ prod }}</span>
                <span class="prix">-- €</span> 
            </div>
        {% endfor %}

        <div class="total-zone">
            <span>TOTAL</span>
            <span>{{ "%.2f" | format(commande.total) }} €</span>
        </div>

        <hr class="separateur">

        <div class="ticket-footer">
            Merci de votre visite !<br>
            Bonne journée ☀️
        </div>
    </div>

</body>
</html>
