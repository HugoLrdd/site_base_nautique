<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Accès Bar - Base Nautique</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a252f;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .card {
            background: #2c3e50;
            padding: 30px 25px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 360px;
            text-align: center;
            border-top: 4px solid #3498db;
        }
        .icone { font-size: 3rem; margin-bottom: 10px; }
        h1 { color: #ecf0f1; margin: 0 0 10px 0; font-size: 1.5rem; }
        p { color: #95a5a6; font-size: 0.9rem; margin-bottom: 20px; }
        
        input[type="password"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #34495e;
            border-radius: 8px;
            font-size: 1.2rem;
            box-sizing: border-box;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 4px;
            background-color: #1a252f;
            color: #ecf0f1;
            /* Empêche le zoom auto sur iPhone */
            -webkit-appearance: none;
        }
        input[type="password"]:focus { border-color: #3498db; outline: none; }
        
        button {
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background-color: #2980b9; }
        
        .erreur {
            background-color: rgba(231, 76, 60, 0.15);
            color: #ff7675;
            border: 1px solid #e74c3c;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icone">👨‍🍳</div>
        <h1>Accès Comptoir</h1>
        <p>Réservé au personnel du bar.</p>
        
        {% if erreur %}
            <div class="erreur">❌ Mot de passe incorrect</div>
        {% endif %}
        
        <form method="POST" action="/login_bar">
            <input type="password" name="mot_de_passe" placeholder="••••" autofocus required>
            <button type="submit">Accéder</button>
        </form>
    </div>
</body>
</html>
