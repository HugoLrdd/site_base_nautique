<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commande introuvable - Base Nautique</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fa;
            margin: 0; padding: 20px;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; text-align: center; color: #333;
        }
        .card {
            background: white; max-width: 380px; width: 100%;
            padding: 40px 30px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .icone { font-size: 60px; margin-bottom: 16px; }
        h1 { font-size: 20px; color: #2c3e50; margin: 0 0 10px; }
        p { font-size: 14px; color: #7f8c8d; line-height: 1.6; margin: 0 0 28px; }
        a.btn {
            display: inline-block;
            background-color: #0056b3; color: white;
            padding: 13px 30px; border-radius: 25px;
            font-weight: bold; font-size: 15px;
            text-decoration: none;
        }
        a.btn:hover { background-color: #003d82; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icone">🔍</div>
        <h1>Commande introuvable</h1>
        <p>
            Ce lien ne correspond à aucune commande.<br>
            Elle a peut-être été supprimée ou ce lien est expiré.
        </p>
        <a href="/" class="btn">⛵ Retour au menu</a>
    </div>
</body>
</html>
