<h2>📦 Ventes par produit</h2>
        <table>
            <thead>
                <tr>
                    <th>Nom du produit</th>
                    <th>Quantité vendue</th>
                </tr>
            </thead>
            <tbody>
                {# stats_produits est déjà trié par le code Python #}
                {% for produit, quantite in stats_produits %}
                <tr>
                    <td>{{ produit }}</td>
                    <td class="quantite">x {{ quantite }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="2" style="text-align: center; color: #95a5a6;">Aucune vente enregistrée pour le moment.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
