<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Bilan - Base Nautique</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #2c3e50; margin: 0; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; padding: 40px 30px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); width: 100%; max-width: 360px; text-align: center; }
        h1 { color: #2c3e50; margin: 0 0 8px 0; font-size: 22px; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        input[type="password"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; text-align: center; letter-spacing: 4px; }
        input[type="password"]:focus { border-color: #3498db; outline: none; }
        button { width: 100%; background-color: #3498db; color: white; border: none; padding: 13px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #2980b9; }
        .erreur { background-color: #fdf2f2; color: #e74c3c; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔒 Accès Bilan</h1>
        <p>Cette page est réservée au responsable.</p>

        {% if erreur %}
            <div class="erreur">❌ Mot de passe incorrect</div>
        {% endif %}

        <form method="POST" action="/bilan">
            <input type="password" name="mot_de_passe" placeholder="Mot de passe" autofocus>
            <button type="submit">Accéder au bilan</button>
        </form>
    </div>
</body>
</html>
