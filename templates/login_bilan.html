<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Accès Bilan - Base Nautique</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #2c3e50; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            box-sizing: border-box;
        }

        .card { 
            background: white; 
            padding: 35px 25px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 360px; 
            text-align: center; 
        }

        h1 { color: #2c3e50; margin: 0 0 10px 0; font-size: 1.5rem; }
        p { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 25px; }

        input[type="password"] { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            font-size: 1.2rem; 
            box-sizing: border-box; 
            margin-bottom: 15px; 
            text-align: center; 
            letter-spacing: 5px;
            -webkit-appearance: none;
        }

        input[type="password"]:focus { border-color: #3498db; outline: none; }

        button { 
            width: 100%; 
            background-color: #3498db; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 1rem; 
            font-weight: bold; 
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #2980b9; }

        .erreur { 
            background-color: #fdf2f2; 
            color: #e74c3c; 
            padding: 12px; 
            border-radius: 6px; 
            margin-bottom: 15px; 
            font-weight: bold; 
            font-size: 0.9rem;
            border: 1px solid #ffcfcf;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔒 Accès Bilan</h1>
        <p>Espace réservé au responsable.</p>

        {% if erreur %}
            <div class="erreur">❌ Mot de passe incorrect</div>
        {% endif %}

        <form method="POST" action="/bilan">
            <input type="password" name="mot_de_passe" placeholder="••••" autofocus required>
            <button type="submit">Valider</button>
        </form>
    </div>
</body>
</html>
