<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Base Nautique de Merville</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fa;
            margin: 0;
            padding: 0;
            color: #333;
            padding-bottom: 120px; /* Espace pour pas que le panier cache les produits */
        }
        .header {
            background: linear-gradient(135deg, #0056b3, #00a8ff);
            color: white;
            text-align: center;
            padding: 30px 20px;
        }
        .header h1 { margin: 0; font-size: 28px; }
        .header p { margin: 5px 0 0 0; opacity: 0.9; }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .categorie-titre {
            font-size: 20px;
            color: #0056b3;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 5px;
            margin-top: 30px;
        }

        .produit-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-vertical: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .produit-infos {
            display: flex;
            flex-direction: column;
        }

        .produit-nom { font-weight: bold; font-size: 16px; }
        .produit-prix { color: #2ecc71; font-weight: 600; margin-top: 4px; }

        .btn-ajouter {
            background-color: #00a8ff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-ajouter:hover { background-color: #0084cc; }

        /* Style du panier fixe en bas de l'écran */
        #panier-section {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
            padding: 15px;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            max-width: 600px;
            margin: 0 auto;
            z-index: 1000;
        }

        .panier-resume {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .panier-total { color: #2ecc71; font-size: 18px; }

        #liste-panier {
            list-style: none;
            padding: 0;
            margin: 0 0 15px 0;
            max-height: 80px;
            overflow-y: auto;
            font-size: 14px;
            color: #555;
        }
        #liste-panier li {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px dashed #eee;
        }
        .btn-supprimer {
            color: #e74c3c;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }

        .btn-valider {
            width: 100%;
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.2);
        }
        .btn-valider:hover { background-color: #27ae60; }
    </style>
</head>
<body>

    <div class="header">
        <h1>⛵ Base Nautique de Merville</h1>
        <p>Commandez vos boissons & encas depuis votre transat</p>
    </div>

    <div class="container">
        <!-- Boucle Flask pour afficher automatiquement les catégories et produits de app.py -->
        {% for categorie, produits in menu.items() %}
            <div class="categorie-titre">{{ categorie }}</div>
            {% for p in produits %}
                <div class="produit-card">
                    <div class="produit-infos">
                        <span class="produit-nom">{{ p.nom }}</span>
                        <span class="produit-prix">{{ "%.2f" | format(p.prix) }} €</span>
                    </div>
                    <button class="btn-ajouter" onclick="ajouterAuPanier('{{ p.nom }}', {{ p.prix }})">
                        ＋ Ajouter
                    </button>
                </div>
            {% endfor %}
        {% endfor %}
    </div>

    <!-- Le Panier intelligent -->
    <div id="panier-section">
        <div class="panier-resume">
            <span>🛒 Mon Panier (<span id="panier-nb-articles">0</span>)</span>
            <span class="panier-total"><span id="total-prix">0.00</span> €</span>
        </div>
        
        <!-- Liste dynamique des objets ajoutés -->
        <ul id="liste-panier"></ul>
        
        <button class="btn-valider" onclick="envoyerCommande()">
            🚀 Envoyer la commande au bar
        </button>
    </div>

    <script>
        // Le panier qui va stocker nos objets
        let panier = [];

        function ajouterAuPanier(nom, prix) {
            // On ajoute l'objet dans notre tableau JavaScript
            panier.push({ nom: nom, prix: prix });
            mettreAJourAffichage();
        }

        function supprimerDuPanier(index) {
            // Supprime l'élément ciblé
            panier.splice(index, 1);
            mettreAJourAffichage();
        }

        function mettreAJourAffichage() {
            let listeHTML = document.getElementById('liste-panier');
            let nbArticles = document.getElementById('panier-nb-articles');
            let totalPrix = document.getElementById('total-prix');
            
            // On vide la liste avant de la reconstruire
            listeHTML.innerHTML = "";
            let total = 0;

            panier.forEach((item, index) => {
                total += item.prix;
                
                // On crée une ligne propre pour chaque objet de la commande
                let li = document.createElement('li');
                li.innerHTML = `
                    <span>• ${item.nom}</span>
                    <span>${item.prix.toFixed(2)} € <span class="btn-supprimer" onclick="supprimerDuPanier(${index})">❌</span></span>
                `;
                listeHTML.appendChild(li);
            });

            // Mise à jour des compteurs du bandeau de commande
            nbArticles.innerText = panier.length;
            totalPrix.innerText = total.toFixed(2);
        }

        function envoyerCommande() {
            if (panier.length === 0) {
                alert("Votre panier est vide ! Ajoutez des produits avant d'envoyer.");
                return;
            }

            // On extrait uniquement les noms des produits pour Python
            let formData = new URLSearchParams();
            panier.forEach(item => {
                formData.append('produits', item.nom);
            });

            // Envoi de la commande en arrière-plan à Flask
            fetch('/commander', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    // 🔥 L'ONGLET MAGIQUE : On ouvre la page de suivi dans un nouvel onglet
                    window.open(response.url, '_blank');
                    
                    // On nettoie le panier sur la carte pour une future commande
                    panier = [];
                    mettreAJourAffichage();
                } else {
                    alert("Oups, impossible de transmettre la commande au bar.");
                }
            })
            .catch(error => {
                alert("Erreur de connexion avec le comptoir.");
                console.error(error);
            });
        }
    </script>
</body>
</html>
