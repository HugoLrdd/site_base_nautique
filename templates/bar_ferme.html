<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'Quai - Fermé</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f7f9fa; 
            margin: 0; 
            padding: 20px; 
            text-align: center; 
            color: #333; 
        }
        .card { 
            background: white; 
            max-width: 400px; 
            margin: 80px auto; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h1 { 
            color: #d63031; 
            font-size: 26px; 
            margin-bottom: 15px; 
        }
        p { 
            color: #555; 
            font-size: 16px; 
            line-height: 1.5; 
        }
        .icon { 
            font-size: 50px; 
            margin-bottom: 10px; 
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🛑</div>
        <h1>Le bar est fermé</h1>
        <p>Désolé, le bar est actuellement fermé.<br>Les commandes en ligne ne sont pas disponibles pour le moment.<br><br>Revenez bientôt !</p>
    </div>
</body>
</html>
